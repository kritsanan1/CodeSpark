<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">
    Dyad AI App Builder - System Architecture
  </text>
  
  <!-- Frontend Layer -->
  <g id="frontend-layer">
    <!-- Frontend Container -->
    <rect x="50" y="80" width="500" height="300" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="300" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#0284c7">
      Frontend (React + TypeScript)
    </text>
    
    <!-- React Router -->
    <rect x="70" y="120" width="120" height="40" rx="4" fill="#3b82f6" stroke="#1d4ed8"/>
    <text x="130" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">React Router</text>
    
    <!-- Pages -->
    <rect x="70" y="170" width="80" height="30" rx="4" fill="#60a5fa" stroke="#3b82f6"/>
    <text x="110" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Editor</text>
    
    <rect x="160" y="170" width="80" height="30" rx="4" fill="#60a5fa" stroke="#3b82f6"/>
    <text x="200" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Templates</text>
    
    <rect x="250" y="170" width="80" height="30" rx="4" fill="#60a5fa" stroke="#3b82f6"/>
    <text x="290" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Community</text>
    
    <rect x="340" y="170" width="80" height="30" rx="4" fill="#60a5fa" stroke="#3b82f6"/>
    <text x="380" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Settings</text>
    
    <!-- Components -->
    <rect x="70" y="210" width="100" height="40" rx="4" fill="#a78bfa" stroke="#7c3aed"/>
    <text x="120" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Code Editor</text>
    
    <rect x="180" y="210" width="100" height="40" rx="4" fill="#a78bfa" stroke="#7c3aed"/>
    <text x="230" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">AI Panel</text>
    
    <rect x="290" y="210" width="100" height="40" rx="4" fill="#a78bfa" stroke="#7c3aed"/>
    <text x="340" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">File Explorer</text>
    
    <rect x="400" y="210" width="100" height="40" rx="4" fill="#a78bfa" stroke="#7c3aed"/>
    <text x="450" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Terminal</text>
    
    <!-- State Management -->
    <rect x="70" y="260" width="150" height="40" rx="4" fill="#f59e0b" stroke="#d97706"/>
    <text x="145" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">TanStack Query</text>
    
    <!-- UI Library -->
    <rect x="230" y="260" width="150" height="40" rx="4" fill="#10b981" stroke="#059669"/>
    <text x="305" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">shadcn/ui + Tailwind</text>
    
    <!-- Theme Provider -->
    <rect x="390" y="260" width="100" height="40" rx="4" fill="#8b5cf6" stroke="#7c3aed"/>
    <text x="440" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">Theme Provider</text>
  </g>
  
  <!-- Backend Layer -->
  <g id="backend-layer">
    <!-- Backend Container -->
    <rect x="650" y="80" width="500" height="300" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="900" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">
      Backend (Express + TypeScript)
    </text>
    
    <!-- Express Server -->
    <rect x="670" y="120" width="120" height="40" rx="4" fill="#22c55e" stroke="#16a34a"/>
    <text x="730" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">Express Server</text>
    
    <!-- API Routes -->
    <rect x="670" y="170" width="80" height="30" rx="4" fill="#34d399" stroke="#10b981"/>
    <text x="710" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Users API</text>
    
    <rect x="760" y="170" width="80" height="30" rx="4" fill="#34d399" stroke="#10b981"/>
    <text x="800" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Projects API</text>
    
    <rect x="850" y="170" width="80" height="30" rx="4" fill="#34d399" stroke="#10b981"/>
    <text x="890" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Templates API</text>
    
    <rect x="940" y="170" width="80" height="30" rx="4" fill="#34d399" stroke="#10b981"/>
    <text x="980" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Community API</text>
    
    <rect x="1030" y="170" width="80" height="30" rx="4" fill="#34d399" stroke="#10b981"/>
    <text x="1070" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">AI API</text>
    
    <!-- Services -->
    <rect x="670" y="210" width="120" height="40" rx="4" fill="#ef4444" stroke="#dc2626"/>
    <text x="730" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Storage Service</text>
    
    <rect x="800" y="210" width="120" height="40" rx="4" fill="#ef4444" stroke="#dc2626"/>
    <text x="860" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Gemini Service</text>
    
    <rect x="930" y="210" width="120" height="40" rx="4" fill="#ef4444" stroke="#dc2626"/>
    <text x="990" y="235" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Auth Service</text>
    
    <!-- Middleware -->
    <rect x="670" y="260" width="100" height="40" rx="4" fill="#6366f1" stroke="#4f46e5"/>
    <text x="720" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">CORS</text>
    
    <rect x="780" y="260" width="100" height="40" rx="4" fill="#6366f1" stroke="#4f46e5"/>
    <text x="830" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Rate Limiting</text>
    
    <rect x="890" y="260" width="100" height="40" rx="4" fill="#6366f1" stroke="#4f46e5"/>
    <text x="940" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Validation</text>
    
    <rect x="1000" y="260" width="100" height="40" rx="4" fill="#6366f1" stroke="#4f46e5"/>
    <text x="1050" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Logging</text>
  </g>
  
  <!-- Database Layer -->
  <g id="database-layer">
    <!-- Database Container -->
    <rect x="50" y="420" width="300" height="200" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="200" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">
      Database (PostgreSQL)
    </text>
    
    <!-- Tables -->
    <rect x="70" y="460" width="80" height="30" rx="4" fill="#a855f7" stroke="#9333ea"/>
    <text x="110" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">users</text>
    
    <rect x="160" y="460" width="80" height="30" rx="4" fill="#a855f7" stroke="#9333ea"/>
    <text x="200" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">projects</text>
    
    <rect x="250" y="460" width="80" height="30" rx="4" fill="#a855f7" stroke="#9333ea"/>
    <text x="290" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">templates</text>
    
    <rect x="70" y="500" width="80" height="30" rx="4" fill="#a855f7" stroke="#9333ea"/>
    <text x="110" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">community_posts</text>
    
    <rect x="160" y="500" width="80" height="30" rx="4" fill="#a855f7" stroke="#9333ea"/>
    <text x="200" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">ai_suggestions</text>
    
    <!-- ORM -->
    <rect x="70" y="540" width="260" height="40" rx="4" fill="#c084fc" stroke="#a855f7"/>
    <text x="200" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">Drizzle ORM</text>
  </g>
  
  <!-- External Services -->
  <g id="external-services">
    <!-- AI Services Container -->
    <rect x="400" y="420" width="200" height="200" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="500" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#10b981">
      AI Services
    </text>
    
    <!-- Google Gemini -->
    <rect x="420" y="460" width="160" height="40" rx="4" fill="#22c55e" stroke="#16a34a"/>
    <text x="500" y="485" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">Google Gemini API</text>
    
    <!-- AI Features -->
    <rect x="420" y="510" width="70" height="25" rx="4" fill="#4ade80" stroke="#22c55e"/>
    <text x="455" y="527" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Code Analysis</text>
    
    <rect x="500" y="510" width="70" height="25" rx="4" fill="#4ade80" stroke="#22c55e"/>
    <text x="535" y="527" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Generation</text>
    
    <rect x="420" y="545" width="70" height="25" rx="4" fill="#4ade80" stroke="#22c55e"/>
    <text x="455" y="562" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Suggestions</text>
    
    <rect x="500" y="545" width="70" height="25" rx="4" fill="#4ade80" stroke="#22c55e"/>
    <text x="535" y="562" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Refactoring</text>
    
    <!-- Cloud Services Container -->
    <rect x="650" y="420" width="200" height="200" rx="8" fill="#fef7cd" stroke="#eab308" stroke-width="2"/>
    <text x="750" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#eab308">
      Cloud Services
    </text>
    
    <!-- Supabase -->
    <rect x="670" y="460" width="160" height="40" rx="4" fill="#f59e0b" stroke="#d97706"/>
    <text x="750" y="485" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="white">Supabase</text>
    
    <!-- Supabase Features -->
    <rect x="670" y="510" width="70" height="25" rx="4" fill="#fbbf24" stroke="#f59e0b"/>
    <text x="705" y="527" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Auth</text>
    
    <rect x="750" y="510" width="70" height="25" rx="4" fill="#fbbf24" stroke="#f59e0b"/>
    <text x="785" y="527" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Database</text>
    
    <rect x="670" y="545" width="70" height="25" rx="4" fill="#fbbf24" stroke="#f59e0b"/>
    <text x="705" y="562" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Storage</text>
    
    <rect x="750" y="545" width="70" height="25" rx="4" fill="#fbbf24" stroke="#f59e0b"/>
    <text x="785" y="562" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="white">Real-time</text>
  </g>
  
  <!-- Development Tools -->
  <g id="dev-tools">
    <!-- Dev Tools Container -->
    <rect x="900" y="420" width="250" height="200" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="1025" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#ec4899">
      Development Tools
    </text>
    
    <!-- Build Tools -->
    <rect x="920" y="460" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="960" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Vite</text>
    
    <rect x="1010" y="460" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="1050" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">TypeScript</text>
    
    <rect x="1100" y="460" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="1140" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">ESBuild</text>
    
    <!-- Testing -->
    <rect x="920" y="500" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="960" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Vitest</text>
    
    <rect x="1010" y="500" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="1050" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Playwright</text>
    
    <!-- Linting -->
    <rect x="920" y="540" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="960" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">ESLint</text>
    
    <rect x="1010" y="540" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="1050" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Prettier</text>
    
    <rect x="1100" y="540" width="80" height="30" rx="4" fill="#f472b6" stroke="#ec4899"/>
    <text x="1140" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="white">Tailwind</text>
  </g>
  
  <!-- Data Flow Arrows -->
  <g id="data-flow" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <!-- Frontend to Backend -->
    <path d="M 550 230 L 650 230" stroke="#3b82f6"/>
    <text x="600" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#3b82f6">HTTP/REST</text>
    
    <!-- Backend to Database -->
    <path d="M 750 380 L 250 420" stroke="#8b5cf6"/>
    <text x="500" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8b5cf6">SQL Queries</text>
    
    <!-- Backend to AI Services -->
    <path d="M 850 380 L 550 420" stroke="#10b981"/>
    <text x="700" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#10b981">AI API Calls</text>
    
    <!-- Backend to Cloud Services -->
    <path d="M 900 380 L 750 420" stroke="#eab308"/>
    <text x="825" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#eab308">Cloud APIs</text>
  </g>
  
  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="50" y="650" width="1100" height="120" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="600" y="675" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">
      Architecture Legend
    </text>
    
    <!-- Frontend Legend -->
    <rect x="70" y="690" width="20" height="15" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="100" y="702" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">Frontend Layer (React)</text>
    
    <!-- Backend Legend -->
    <rect x="250" y="690" width="20" height="15" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="280" y="702" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">Backend Layer (Express)</text>
    
    <!-- Database Legend -->
    <rect x="430" y="690" width="20" height="15" fill="#f3e8ff" stroke="#8b5cf6"/>
    <text x="460" y="702" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">Database (PostgreSQL)</text>
    
    <!-- AI Services Legend -->
    <rect x="580" y="690" width="20" height="15" fill="#ecfdf5" stroke="#10b981"/>
    <text x="610" y="702" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">AI Services</text>
    
    <!-- Cloud Services Legend -->
    <rect x="720" y="690" width="20" height="15" fill="#fef7cd" stroke="#eab308"/>
    <text x="750" y="702" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">Cloud Services</text>
    
    <!-- Dev Tools Legend -->
    <rect x="870" y="690" width="20" height="15" fill="#fce7f3" stroke="#ec4899"/>
    <text x="900" y="702" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">Development Tools</text>
    
    <!-- Data Flow Legend -->
    <line x1="70" y1="720" x2="90" y2="720" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="100" y="725" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">HTTP/REST API</text>
    
    <line x1="220" y1="720" x2="240" y2="720" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="250" y="725" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">Database Queries</text>
    
    <line x1="370" y1="720" x2="390" y2="720" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="400" y="725" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">AI API Calls</text>
    
    <line x1="520" y1="720" x2="540" y2="720" stroke="#eab308" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="550" y="725" font-family="Inter, sans-serif" font-size="12" fill="#1f2937">Cloud Services</text>
    
    <!-- Technology Stack -->
    <text x="70" y="750" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#1f2937">Tech Stack:</text>
    <text x="150" y="750" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">React 18 • TypeScript • Vite • Express.js • PostgreSQL • Drizzle ORM • TanStack Query • Tailwind CSS • shadcn/ui</text>
  </g>
</svg>